openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Dashboard Monitoring Bencana Aceh API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: bencana
    description: Disaster monitoring data
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /bencana/summary:
    get:
      operationId: getBencanaSummary
      tags: [bencana]
      summary: Get full dashboard summary
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BencanaSummary"

  /bencana/dampak:
    get:
      operationId: getBencanaDampak
      tags: [bencana]
      summary: Get impact data per kabupaten
      responses:
        "200":
          description: List of impact records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DampakRecord"

  /bencana/pertanian:
    get:
      operationId: getBencanaPertanian
      tags: [bencana]
      summary: Get agriculture damage data
      responses:
        "200":
          description: List of agriculture damage records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PertanianRecord"

  /bencana/pengungsi:
    get:
      operationId: getBencanaPengungsi
      tags: [bencana]
      summary: Get population/refugee data per kabupaten
      responses:
        "200":
          description: List of population records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PendudukRecord"

  /bencana/orang-hilang:
    get:
      operationId: getBencanaOrangHilang
      tags: [bencana]
      summary: Get missing persons data
      responses:
        "200":
          description: List of missing persons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrangHilangRecord"

  /bencana/bantuan:
    get:
      operationId: getBencanaBantuan
      tags: [bencana]
      summary: Get village-level aid distribution data
      responses:
        "200":
          description: List of village aid records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BantuanDesaRecord"

  /bencana/markers:
    get:
      operationId: getBencanaMarkers
      tags: [bencana]
      summary: Get map markers
      responses:
        "200":
          description: List of map markers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MapMarker"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    RekapCluster:
      type: object
      required: [kerusakan, kerugian, total, perSektor]
      properties:
        kerusakan:
          type: string
        kerugian:
          type: string
        total:
          type: string
        perSektor:
          type: array
          items:
            type: object
            required: [nama, nilai]
            properties:
              nama:
                type: string
              nilai:
                type: string

    FaskesStats:
      type: object
      required: [puskesmas, rsud, fasyankes]
      properties:
        puskesmas:
          type: integer
        rsud:
          type: integer
        fasyankes:
          type: integer

    JaringanStats:
      type: object
      required: [critical, warning, normal]
      properties:
        critical:
          type: integer
        warning:
          type: integer
        normal:
          type: integer

    PoskoStats:
      type: object
      required: [totalPosko, totalPengungsi, titikPengungsian]
      properties:
        totalPosko:
          type: integer
        totalPengungsi:
          type: integer
        titikPengungsian:
          type: integer

    BantuanStatusStats:
      type: object
      required: [totalDesa, kuning, biru, abu, putih]
      properties:
        totalDesa:
          type: integer
        kuning:
          type: integer
        biru:
          type: integer
        abu:
          type: integer
        putih:
          type: integer

    BencanaSummary:
      type: object
      required:
        - totalKorban
        - totalPengungsi
        - titikPengungsian
        - rumahRusak
        - sawahHa
        - kabupatenTerdampak
        - fasumRusak
        - kebunHa
        - tambakHa
        - rekapCluster
        - faskes
        - jaringan
        - posko
        - bantuan
        - lastUpdate
      properties:
        totalKorban:
          type: integer
        totalPengungsi:
          type: integer
        titikPengungsian:
          type: integer
        rumahRusak:
          type: integer
        sawahHa:
          type: number
        kabupatenTerdampak:
          type: integer
        fasumRusak:
          type: integer
        kebunHa:
          type: number
        tambakHa:
          type: number
        rekapCluster:
          $ref: "#/components/schemas/RekapCluster"
        faskes:
          $ref: "#/components/schemas/FaskesStats"
        jaringan:
          $ref: "#/components/schemas/JaringanStats"
        posko:
          $ref: "#/components/schemas/PoskoStats"
        bantuan:
          $ref: "#/components/schemas/BantuanStatusStats"
        lastUpdate:
          type: string

    DampakRecord:
      type: object
      required:
        - id
        - kabupaten
        - kecamatan
        - jenisKejadian
        - korbanJiwa
        - korbanLuka
        - rumahRusakBerat
        - rumahRusakRingan
        - sawahTerdampakHa
        - tanggal
        - status
      properties:
        id:
          type: integer
        kabupaten:
          type: string
        kecamatan:
          type: string
        jenisKejadian:
          type: string
        korbanJiwa:
          type: integer
        korbanLuka:
          type: integer
        rumahRusakBerat:
          type: integer
        rumahRusakRingan:
          type: integer
        sawahTerdampakHa:
          type: number
        tanggal:
          type: string
        status:
          type: string

    PertanianRecord:
      type: object
      required: [id, nama, kabupaten, kecamatan, volume, kerugian, kondisi]
      properties:
        id:
          type: integer
        nama:
          type: string
        kabupaten:
          type: string
        kecamatan:
          type: string
        volume:
          type: number
        kerugian:
          type: string
        kondisi:
          type: string

    PendudukRecord:
      type: object
      required: [id, kabupaten, penduduk, kk, disabilitas, pengungsi]
      properties:
        id:
          type: integer
        kabupaten:
          type: string
        penduduk:
          type: integer
        kk:
          type: integer
        disabilitas:
          type: integer
        pengungsi:
          type: integer

    OrangHilangRecord:
      type: object
      required: [id, nama, usia, kecamatan, kabupaten, status, tanggal]
      properties:
        id:
          type: integer
        nama:
          type: string
        usia:
          type: integer
        kecamatan:
          type: string
        kabupaten:
          type: string
        status:
          type: string
        tanggal:
          type: string

    BantuanDesaRecord:
      type: object
      required: [id, desa, kecamatan, kabupaten, satuan, warna]
      properties:
        id:
          type: integer
        desa:
          type: string
        kecamatan:
          type: string
        kabupaten:
          type: string
        satuan:
          type: string
        warna:
          type: string

    MapMarker:
      type: object
      required: [id, lat, lng, kabupaten, kecamatan, jenisBencana, severity, korban, pengungsi]
      properties:
        id:
          type: integer
        lat:
          type: number
        lng:
          type: number
        kabupaten:
          type: string
        kecamatan:
          type: string
        jenisBencana:
          type: string
        severity:
          type: string
        korban:
          type: integer
        pengungsi:
          type: integer
