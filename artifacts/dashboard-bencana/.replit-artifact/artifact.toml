kind = "web"
previewPath = "/"
title = "Dashboard Data Desa - Jambi"
version = "1.0.0"
id = "artifacts/dashboard-bencana"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24581

[services.development]
run = "pnpm --filter @workspace/dashboard-bencana run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dashboard-bencana", "run", "build" ]
run = "pnpm --filter @workspace/dashboard-bencana run start"

[services.env]
PORT = "24581"
BASE_PATH = "/"
